apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-root-filesystem
  annotations:
    policies.kyverno.io/title: Require Read-Only Root Filesystem
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      A read-only root filesystem helps prevent malicious binaries from being
      written to the container filesystem. This policy requires that all containers
      set readOnlyRootFilesystem to true.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-readonly-root-filesystem
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - tetragon
                - kyverno
                - monitoring
      validate:
        message: "Root filesystem must be read-only. Set securityContext.readOnlyRootFilesystem=true"
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
