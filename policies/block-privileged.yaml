apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-privileged-containers
  annotations:
    policies.kyverno.io/title: Block Privileged Containers
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Privileged mode disables most security mechanisms and must not be allowed.
      This policy blocks any container requesting privileged mode.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-priv-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - tetragon
                - kyverno
                - monitoring
      validate:
        message: "Privileged containers are not allowed. Remove securityContext.privileged or set it to false."
        pattern:
          spec:
            containers:
              - securityContext:
                  =(privileged): "false"
    - name: deny-priv-init-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - tetragon
                - kyverno
                - monitoring
      validate:
        message: "Privileged init containers are not allowed."
        pattern:
          spec:
            =(initContainers):
              - securityContext:
                  =(privileged): "false"
