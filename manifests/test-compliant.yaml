# Test: Compliant Pod (should PASS all Kyverno policies)
# =============================================================================
# This pod complies with all security policies:
#   - require-non-root: runAsNonRoot=true, runAsUser=1000
#   - block-privileged: privileged not set (defaults to false)
#   - require-readonly-root-filesystem: readOnlyRootFilesystem=true
#   - require-resource-limits: cpu & memory limits set
#   - block-host-network-pid: no host namespaces used
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: test-compliant
  labels:
    app: test-compliant
    test: security-compliant
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 8080
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        limits:
          memory: "128Mi"
          cpu: "100m"
        requests:
          memory: "64Mi"
          cpu: "50m"
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
  volumes:
    - name: tmp
      emptyDir: {}
    - name: nginx-cache
      emptyDir: {}
    - name: nginx-run
      emptyDir: {}
