# AlertManager Configuration
# =============================================================================
# Replace YOUR_BOT_TOKEN and YOUR_CHAT_ID with actual values
# 
# To create a Telegram bot:
#   1. Open Telegram -> Search @BotFather
#   2. Send: /newbot
#   3. Follow instructions -> Get BOT_TOKEN
#   4. Create a group and add the bot
#   5. Get CHAT_ID (forward a message to @getidsbot)
# =============================================================================

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'namespace', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'telegram'
  routes:
    - match:
        severity: critical
      receiver: 'telegram'
      group_wait: 5s
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'telegram'
      group_wait: 30s
      repeat_interval: 30m

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: 'YOUR_BOT_TOKEN_HERE'
        chat_id: -1001234567890  # Replace with your actual chat ID
        send_resolved: true
        parse_mode: 'HTML'
        message: |
          {{ if eq .Status "firing" }}🔴 <b>ALERT FIRING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }}

          <b>Alert:</b> {{ .CommonLabels.alertname }}
          <b>Severity:</b> {{ .CommonLabels.severity }}
          <b>Namespace:</b> {{ .CommonLabels.namespace }}

          {{ range .Alerts }}
          <b>Summary:</b> {{ .Annotations.summary }}
          <b>Description:</b> {{ .Annotations.description }}
          <b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

          <b>Cluster:</b> k3s-runtime-security

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'namespace']
