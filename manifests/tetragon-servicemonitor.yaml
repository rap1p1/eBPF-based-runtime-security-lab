apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tetragon
  namespace: monitoring
  labels:
    release: prometheus
    app: tetragon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tetragon
  namespaceSelector:
    matchNames:
      - tetragon
  endpoints:
    - port: prometheus
      interval: 15s
      path: /metrics
      scrapeTimeout: 10s
